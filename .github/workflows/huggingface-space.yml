name: Deploy Backend to Hugging Face Space

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face CLI
        run: pip install -U huggingface_hub

      - name: Verify required secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          test -n "$HF_TOKEN" || (echo "Missing repository secret HF_TOKEN" && exit 1)

      - name: Create or update Space
        id: deploy-space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_OWNER="$(python - <<'PY'
          import os
          from huggingface_hub import HfApi
          print(HfApi().whoami(token=os.environ["HF_TOKEN"])["name"])
          PY
          )"
          HF_SPACE_REPO="${HF_OWNER}/cmg-bill-extractor-api"
          SPACE_URL="https://$(echo "$HF_SPACE_REPO" | tr '[:upper:]' '[:lower:]' | tr '/' '-').hf.space"
          hf repos create "$HF_SPACE_REPO" --type space --space-sdk docker --exist-ok
          hf upload "$HF_SPACE_REPO" backend --type space --commit-message "Deploy CMG OCR backend"
          echo "space_repo=$HF_SPACE_REPO" >> "$GITHUB_OUTPUT"
          echo "space_url=$SPACE_URL" >> "$GITHUB_OUTPUT"

      - name: Connect GitHub Pages to backend API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SPACE_URL="${{ steps.deploy-space.outputs.space_url }}"
          gh variable set NEXT_PUBLIC_API_URL --body "$SPACE_URL" --repo "$GITHUB_REPOSITORY" \
            || echo "::warning::Could not set NEXT_PUBLIC_API_URL with GITHUB_TOKEN. Set it manually to $SPACE_URL."
          gh workflow run pages.yml --repo "$GITHUB_REPOSITORY" \
            || echo "::warning::Could not trigger Pages workflow automatically. Run Deploy GitHub Pages manually."
          echo "Backend API URL: $SPACE_URL"
